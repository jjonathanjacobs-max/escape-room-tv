<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Escape Room TV</title>

<style>
  body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: 'Trebuchet MS', sans-serif;
    text-align: center;
    overflow: hidden;
  }

  #container {
    margin-top: 20vh;
    padding: 20px;
    animation: fadeIn 1.5s ease-in-out;
  }

  #vraag {
    font-size: 3.5rem;
    letter-spacing: 2px;
    text-shadow: 0 0 20px #ff0000;
    margin-bottom: 40px;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }

  /* Vraag rood oplichten bij fout */
  .foutFlash {
    color: #ff3333 !important;
    text-shadow: 0 0 35px #ff0000 !important;
  }

  #feedback {
    font-size: 2.5rem;
    color: #00ff00;
    text-shadow: 0 0 15px #00ff00;
    margin-top: 30px;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
  }

  /* Feedback rood bij fout */
  .foutAntwoord {
    color: #ff3333 !important;
    text-shadow: 0 0 25px #ff0000 !important;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<body>

<canvas id="fireworks" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>

<div id="container">
  <div id="vraag">Wachten op vraag...</div>
  <div id="feedback"></div>
</div>

<script>
// ---- GOOGLE SHEET ID ----
const sheetId = "1qmJfiJ1QGDh_ww98r1ym09fMf_yze_sg_M606lphJj0";
// --------------------------

// URLs om gegevens op te halen
const puzzelUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Puzzels&range=A2:D200`;
const displayUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Display&range=A1:C1`;

let puzzels = [];
let huidigePuzzel = 1;

// Haal alle puzzels op
async function laadPuzzels() {
  const response = await fetch(puzzelUrl);
  const text = await response.text();
  const json = JSON.parse(text.substring(47, text.length - 2));

  puzzels = json.table.rows.map(r => ({
    volgorde: r.c[0]?.v,
    vraag: r.c[1]?.v,
    feedback: r.c[3]?.v
  }));
}

// Haal huidige status op
async function updateDisplay() {
  const response = await fetch(displayUrl);
  const text = await response.text();
  const json = JSON.parse(text.substring(47, text.length - 2));

  const status = json.table.rows[0].c[0]?.v;   // GOED / FOUT
  huidigePuzzel = json.table.rows[0].c[1]?.v || 1; // B1
  const actie = json.table.rows[0].c[2]?.v;    // C1 (NEXT / FEEDBACK / NONE)

  toonVraag();

  if (status === "GOED") {
    toonFeedback();
    startFireworks();
  }

  if (status === "FOUT") {
    foutHighlight();        // vraag rood
    foutAntwoordHighlight(); // feedback rood
  }

  // Manuele bediening
  if (actie === "NEXT") {
    huidigePuzzel++;
    toonVraag();
    resetActie();
  }

  if (actie === "FEEDBACK") {
    toonFeedback();
    resetActie();
  }
}

function resetActie() {
  fetch(`https://script.google.com/macros/s/${sheetId}/exec?reset=1`)
  .catch(() => {});
}

function toonVraag() {
  const puzzel = puzzels.find(p => p.volgorde === huidigePuzzel);
  if (puzzel) {
    document.getElementById("vraag").innerHTML = puzzel.vraag;
  } else {
    document.getElementById("vraag").innerHTML = "Alle puzzels opgelost!";
  }
}

function toonFeedback() {
  const puzzel = puzzels.find(p => p.volgorde === huidigePuzzel - 1);
  if (puzzel) {
    const fb = document.getElementById("feedback");
    fb.innerHTML = puzzel.feedback;
    fb.style.opacity = 1;
  }
}

function verbergFeedback() {
  document.getElementById("feedback").style.opacity = 0;
}

/* --- Vraag rood oplichten --- */
function foutHighlight() {
  const vraag = document.getElementById("vraag");
  vraag.classList.add("foutFlash");

  setTimeout(() => {
    vraag.classList.remove("foutFlash");
  }, 1000);
}

/* --- Feedback rood oplichten --- */
function foutAntwoordHighlight() {
  const fb = document.getElementById("feedback");
  fb.innerHTML = "Fout antwoord!";
  fb.classList.add("foutAntwoord");
  fb.style.opacity = 1;

  setTimeout(() => {
    fb.style.opacity = 0;
    fb.classList.remove("foutAntwoord");
  }, 1200);
}

// --- VUURWERK EFFECT ---
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fireworks = [];

function spawnFirework() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.5;
  const colors = ["#ff0040", "#ff8000", "#ffff00", "#00ff80", "#00c0ff", "#8000ff"];

  for (let i = 0; i < 40; i++) {
    fireworks.push({
      x: x,
      y: y,
      angle: Math.random() * Math.PI * 2,
      speed: Math.random() * 4 + 2,
      radius: Math.random() * 3 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 1
    });
  }
}

function updateFireworks() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  fireworks.forEach((p, i) => {
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;
    p.alpha -= 0.02;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;

    if (p.alpha <= 0) fireworks.splice(i, 1);
  });

  requestAnimationFrame(updateFireworks);
}

updateFireworks();

function startFireworks() {
  for (let i = 0; i < 6; i++) {
    setTimeout(spawnFirework, i * 300);
  }
}

// Start
laadPuzzels();
setInterval(updateDisplay, 1500);
</script>

</body>
</html>
